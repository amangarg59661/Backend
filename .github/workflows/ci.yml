name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks diffs against previous commit range; needs full history
          # to resolve the parent SHA of the push event.  `fetch-depth: 0`
          # pulls every commit — same cost as `fetch-tags: true` and avoids
          # `unknown revision ...^..` errors on the gitleaks step.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Scan for committed secrets
        # gitleaks fails the build on any hit; log-only on non-main branches
        # would be reasonable later, but stay strict for now.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Docker is preinstalled on ubuntu-latest, so Testcontainers "just works".
      # We flip the docker.available flag so AuthControllerIT actually runs.
      - name: Verify + test
        run: mvn -B -ntp verify -Ddocker.available=true

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

  # CI-01: OWASP Dependency Check — flags known CVEs in the Maven graph.
  # Runs in parallel with build so a failing scan doesn't block seeing
  # test results, but a hit still fails the workflow overall.
  dependency-check:
    name: dependency CVE scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No setup-java here.  Dependency-Check_Action runs inside its own
      # container which already ships a JDK.  Installing one on the host
      # only sets a JAVA_HOME env var that is passed to (but invalid
      # inside) the container, so the container's `java` invocation fails
      # with "JAVA_HOME is not defined correctly".

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: self-backend
          path: '.'
          format: 'HTML'
          # `--nvdApiKey` is intentionally omitted.  The action injects
          # `--noupdate` by default, so the CLI never contacts the NVD API
          # at scan time and the key would be a no-op — but passing an
          # empty value (when the `NVD_API_KEY` secret isn't configured
          # on the repo) trips the argparser with
          # "Missing argument for option: nvdApiKey".  Add
          # `--nvdApiKey ${{ secrets.NVD_API_KEY }}` back if we ever
          # remove `--noupdate` or run our own periodic NVD refresh job.
          #
          # CVSS >= 7 (High) fails the job. Lower severities are surfaced
          # in the report artifact for triage.
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports

  # CI-02: SpotBugs + FindSecBugs — SAST for the Java sources.
  sast:
    name: spotbugs SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: SpotBugs
        run: mvn -B -ntp -DskipTests com.github.spotbugs:spotbugs-maven-plugin:4.8.3.0:check
        continue-on-error: false

  # CI-03: CodeQL — GitHub-native SAST covering Java.
  codeql:
    name: codeql
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      # codeql-action pulls workflow-run metadata for its telemetry — needs
      # `actions: read` or the analyze step warns "Resource not accessible
      # by integration".  Grant it explicitly.
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build for CodeQL
        run: mvn -B -ntp -DskipTests package

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # CI-07: Trivy — filesystem + dependency scan.
  trivy:
    name: trivy fs scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Vulnerability scanning is skipped intentionally.  Trivy's vuln
      # scanner walks pom.xml and hits repo.maven.apache.org for each
      # dependency's POM metadata, which triggers a 429 Too Many Requests
      # from Maven Central and fails the job.  OWASP Dependency-Check
      # already runs the full CVE audit in the `dependency-check` job so
      # dropping vuln here has no coverage cost.
      #
      # `TRIVY_OFFLINE_SCAN=true` is belt-and-braces: even the misconfig
      # scanner probes pom.xml metadata online, and offline mode disables
      # every network lookup so the run stays fully local.  Secret +
      # misconfig scanners still find everything they need in the working
      # tree.
      - name: Run Trivy fs scan (secret + misconfig only, offline)
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_OFFLINE_SCAN: "true"
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret,misconfig'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
