# ============================================================================
# Development profile — loose security, Mailhog, local Postgres, Sentry dev.
# ============================================================================

spring:
  jpa:
    show-sql: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

edss:
  features:
    storage:
      # Local file uploads land in Supabase dev bucket (or Minio if you swap
      # the client). S3 impl still gated by flag.
      file-backend: supabase
    auth:
      # Off in dev so testers can hammer login flows without lockouts.
      rate-limit: false
      # v1 has no TOTP enrollment yet; keep 2FA off so login proceeds directly.
      two-factor: false
      # Enrollment endpoints on in dev so devs can test the QR-code path.
      two-factor-enrollment: true
      # Off in dev so a refresh in the browser tab does not silently invalidate
      # other open tabs while you are debugging.
      session-rotation: false
    payments:
      stripe-enabled: false
      razorpay-enabled: false
      manual-enabled: true
    notifications:
      channels:
        email: true
        in-app: true
        whatsapp: false
        sms: false
    integrations:
      calendar:
        provider: manual
        google-sync: false
      messaging:
        whatsapp-enabled: false
  security:
    cors:
      # Wide open for local frontend + Storybook + Vite defaults.
      allowed-origins:
        - http://localhost:3000
        - http://localhost:3001
        - http://localhost:5173
        - http://127.0.0.1:3000
        - http://127.0.0.1:3001

sentry:
  environment: development

logging:
  level:
    com.edss: DEBUG
    org.hibernate.SQL: DEBUG
