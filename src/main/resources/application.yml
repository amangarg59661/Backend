# ============================================================================
# Shared base config. Profile-specific values live in application-dev.yml and
# application-prod.yml. Choose profile via SPRING_PROFILES_ACTIVE=dev|prod
# (defaults to dev).
# ============================================================================

spring:
  application:
    name: self-backend
  profiles:
    default: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: edss-hikari
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    default-schema: shared
    schemas: shared,identity,projects,finance,commitments,knowledge,notifications,organization,relationship,sales,communication,governance,integrations,ai,careers

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  # spring.mail.* — resolved per profile. Base leaves host/port unset so a
  # misconfigured deployment fails loudly instead of silently hitting the wrong
  # SMTP server.
  mail:
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        # O-01: prometheus scrape endpoint. Bind /actuator to an internal
        # port in prod behind a firewall — never public.
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      group:
        readiness:
          # `redis` is intentionally out of the default set — the Redis health
          # indicator opens a socket on every probe, so leaving it in causes
          # Render's readiness gate to hang on deployments that run without a
          # cache. Turn the cache on: set HEALTH_READINESS_INCLUDE to
          # `db,redis,diskSpace,ping` and provision REDIS_* env vars.
          include: ${HEALTH_READINESS_INCLUDE:db,diskSpace,ping}
  metrics:
    tags:
      application: self-backend
      env: ${SENTRY_ENVIRONMENT:dev}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,300ms,1s
  prometheus:
    metrics:
      export:
        enabled: true

edss:
  features:
    storage:
      # supabase (managed) or self-hosted (own Postgres). Documentation tag
      # surfaced in logs; the driver is always Postgres.
      db-provider: ${DB_PROVIDER:self-hosted}
      # `redis-enabled` gates every RedisRefreshTokenStore, RedisRateLimiter,
      # etc.  Same flag whether the backend is Redis or Valkey — Valkey is a
      # BSD-licensed Redis fork with an identical wire protocol, so the
      # Spring Data Redis client speaks both without a code change.  Point
      # REDIS_HOST at whichever server is provisioned.
      redis-enabled: ${REDIS_ENABLED:false}
      # Documentation tag surfaced in logs so operators can tell at a glance
      # which cache backend is behind REDIS_HOST.  Values: redis | valkey.
      # No behaviour change — flip it when you migrate the endpoint.
      cache-provider: ${CACHE_PROVIDER:redis}
      outbox-relay: ${OUTBOX_RELAY:true}
      # supabase | s3. Selects which StorageClient bean is active.
      file-backend: ${FILE_BACKEND:supabase}
    auth:
      two-factor: ${AUTH_TWO_FACTOR:false}
      # Enrollment endpoints exposed independently so 2FA can be prepared
      # before flipping the login-side twoFactor requirement.
      two-factor-enrollment: ${AUTH_TWO_FACTOR_ENROLLMENT:true}
      rate-limit: ${AUTH_RATE_LIMIT:true}
      password-reset: ${AUTH_PASSWORD_RESET:true}
      session-rotation: ${AUTH_SESSION_ROTATION:true}
      remember-device-days: ${AUTH_REMEMBER_DEVICE_DAYS:30}
    observability:
      sentry-enabled: ${SENTRY_ENABLED:false}
    payments:
      # Each provider stays dark until its flag flips true AND its credentials
      # are set in env. Providers are all off by default in dev.
      stripe-enabled: ${PAYMENTS_STRIPE_ENABLED:false}
      razorpay-enabled: ${PAYMENTS_RAZORPAY_ENABLED:false}
      manual-enabled: ${PAYMENTS_MANUAL_ENABLED:true}
    notifications:
      channels:
        email: ${NOTIFICATIONS_EMAIL:true}
        in-app: ${NOTIFICATIONS_IN_APP:true}
        whatsapp: ${NOTIFICATIONS_WHATSAPP:false}
        sms: ${NOTIFICATIONS_SMS:false}
    integrations:
      mail:
        # mailhog (dev) | resend (prod). Documentation tag; SMTP host/port
        # decide the actual delivery path.
        provider: ${MAIL_PROVIDER:mailhog}
      calendar:
        # calcom | calendly | manual. Only the selected one is wired for
        # booking links + webhook processing.
        provider: ${CALENDAR_PROVIDER:manual}
        google-sync: ${GOOGLE_CALENDAR_SYNC:false}
      messaging:
        whatsapp-enabled: ${WHATSAPP_ENABLED:false}

  security:
    jwt:
      secret: ${JWT_SECRET}
      access-ttl: ${JWT_ACCESS_TTL:PT15M}
      refresh-ttl: ${JWT_REFRESH_TTL:P30D}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001}
    rate-limit:
      login-per-email-per-window: ${RATE_LIMIT_EMAIL:5}
      login-per-ip-per-window: ${RATE_LIMIT_IP:20}
      window: PT15M
    secrets:
      # Base64 32-byte key. Used for AES-GCM at-rest encryption of TOTP secrets
      # and trusted-device keys. Rotating it invalidates every stored ciphertext.
      encryption-key: ${SECRET_ENCRYPTION_KEY:}
    # Only trust X-Forwarded-For when the immediate peer is inside one of
    # these CIDR blocks. Leave empty to always fall back to request.getRemoteAddr().
    proxy:
      trusted-cidrs: ${TRUSTED_PROXY_CIDRS:}
  mail:
    from: ${MAIL_FROM:no-reply@edss.local}
  admin:
    email: ${ADMIN_EMAIL:admin@edss.local}
    password: ${ADMIN_PASSWORD:}
  outbox:
    relay-interval-ms: 250
    batch-size: 50
  payments:
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    razorpay:
      key-id: ${RAZORPAY_KEY_ID:}
      key-secret: ${RAZORPAY_KEY_SECRET:}
      webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
  messaging:
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      whatsapp-from: ${TWILIO_WHATSAPP_FROM:}
  calendar:
    calcom:
      api-key: ${CALCOM_API_KEY:}
      webhook-secret: ${CALCOM_WEBHOOK_SECRET:}
    calendly:
      api-key: ${CALENDLY_API_KEY:}
      webhook-secret: ${CALENDLY_WEBHOOK_SECRET:}
    google:
      oauth-client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
      oauth-client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/integrations/google/callback}
  storage:
    supabase:
      url: ${SUPABASE_URL:}
      service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
      bucket-prefix: ${SUPABASE_BUCKET_PREFIX:edss}
    s3:
      region: ${AWS_REGION:us-east-1}
      access-key-id: ${AWS_ACCESS_KEY_ID:}
      secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
      bucket: ${AWS_S3_BUCKET:}
    buckets:
      contracts: contracts
      milestones: milestones
      avatars: avatars
      files: files
      tickets: tickets
  notifications:
    routing:
      identity.password_reset_requested: [email]
      identity.user_registered: [email, in_app]
      relationship.inquiry_converted: [email, in_app]
      projects.project_created: [email, in_app]
      projects.phase_transitioned: [in_app]
      projects.milestone_submitted: [email, in_app, whatsapp]
      projects.milestone_reviewed: [email, in_app]
      projects.contract_uploaded: [email, in_app]
      projects.onboarding_scheduled: [email, in_app]
      projects.maintenance_started: [email, in_app]
      projects.project_closed: [email, in_app]
      finance.invoice_issued: [email, in_app, whatsapp]
      finance.invoice_paid: [email, in_app]
      finance.invoice_voided: [email, in_app]
      commitments.ticket_opened: [email, in_app]
      commitments.ticket_replied: [email, in_app]
      commitments.ticket_status_changed: [in_app]
      # C-1 careers module. application_submitted + application_reviewed
      # target the anonymous applicant (email only — no backend user id
      # so in-app is skipped by the resolver). posting_published is a
      # staff signal; broadcast-to-staff fanout is a Wave-3 enhancement,
      # today the payload has no user_id so dispatch is a no-op.
      careers.application_submitted: [email]
      careers.application_reviewed: [email]
      careers.posting_published: [in_app]
      # C-2: inquiry_acknowledged fires the auto thank-you back to the
      # submitter (anonymous, email only). inquiry_submitted is the
      # staff-triage signal — kept for future staff-broadcast wiring.
      relationship.inquiry_submitted: [email, in_app]
      relationship.inquiry_acknowledged: [email]

sentry:
  enabled: ${SENTRY_ENABLED:false}
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:dev}
  release: ${SENTRY_RELEASE:self-backend@0.1.0-SNAPSHOT}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  send-default-pii: false
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info
  in-app-includes: com.edss

logging:
  level:
    root: INFO
    com.edss: INFO
    org.springframework.security: INFO
