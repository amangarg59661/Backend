spring:
  application:
    name: self-backend
  profiles:
    default: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: edss-hikari
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    default-schema: shared
    schemas: shared,identity,projects,finance,commitments,knowledge,notifications,organization,relationship,sales,communication,governance,integrations,ai

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

edss:
  # ---------------------------------------------------------------------------
  # Feature flags. Single surface for every toggle. Add new flags in
  # com.edss.shared.config.FeaturesProperties and reference them here.
  # ---------------------------------------------------------------------------
  features:
    storage:
      # supabase (managed) or self-hosted (own Postgres). Documentation tag;
      # actual switching is a DB_URL change since both are Postgres.
      db-provider: ${DB_PROVIDER:supabase}
      # In-memory (false) vs Redis (true) for refresh tokens, 2FA challenges,
      # rate-limit buckets. Enable when scaling to multiple instances.
      redis-enabled: ${REDIS_ENABLED:false}
      # Outbox relay on/off. Off = domain events never publish (useful for
      # data-import migrations that shouldn't fan out notifications).
      outbox-relay: ${OUTBOX_RELAY:true}
    auth:
      # TOTP challenge after correct password. v1 has no enrollment yet, so
      # keep off in dev; flip on once settings/2FA-enrollment lands.
      two-factor: ${AUTH_TWO_FACTOR:false}
      # Per-email + per-IP login rate limit. Disable in load tests only.
      rate-limit: ${AUTH_RATE_LIMIT:true}
      # /auth/forgot-password + /auth/reset-password endpoints active.
      password-reset: ${AUTH_PASSWORD_RESET:true}
      # Rotate refresh token on every /auth/refresh call. Safer default.
      session-rotation: ${AUTH_SESSION_ROTATION:true}
    observability:
      # Ship uncaught exceptions and Logback ERROR events to Sentry. Requires
      # SENTRY_DSN when true. See sentry: block below for tuning.
      sentry-enabled: ${SENTRY_ENABLED:false}
    integrations:
      mail:
        # mailhog | smtp | ses | sendgrid. Only mailhog / smtp wired in v1.
        provider: ${MAIL_PROVIDER:mailhog}

# Sentry starter binds under its own namespace. Both blocks share
# SENTRY_ENABLED so they can never disagree.
sentry:
  enabled: ${SENTRY_ENABLED:false}
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:dev}
  release: ${SENTRY_RELEASE:self-backend@0.1.0-SNAPSHOT}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  send-default-pii: false
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info
  in-app-includes: com.edss

  security:
    jwt:
      secret: ${JWT_SECRET}
      access-ttl: ${JWT_ACCESS_TTL:PT15M}
      refresh-ttl: ${JWT_REFRESH_TTL:P30D}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001}
    rate-limit:
      login-per-email-per-window: 5
      login-per-ip-per-window: 20
      window: PT15M
  mail:
    from: ${MAIL_FROM:no-reply@edss.local}
  admin:
    email: ${ADMIN_EMAIL:admin@edss.local}
    password: ${ADMIN_PASSWORD:}
  outbox:
    relay-interval-ms: 250
    batch-size: 50

logging:
  level:
    root: INFO
    com.edss: DEBUG
    org.springframework.security: INFO
