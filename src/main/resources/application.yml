spring:
  application:
    name: self-backend
  profiles:
    default: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: edss-hikari
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    default-schema: shared
    schemas: shared,identity,projects,finance,commitments,knowledge,notifications,organization,relationship,sales,communication,governance,integrations,ai

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

edss:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-ttl: ${JWT_ACCESS_TTL:PT15M}
      refresh-ttl: ${JWT_REFRESH_TTL:P30D}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001}
    rate-limit:
      login-per-email-per-window: 5
      login-per-ip-per-window: 20
      window: PT15M
  mail:
    from: ${MAIL_FROM:no-reply@edss.local}
  admin:
    email: ${ADMIN_EMAIL:admin@edss.local}
    password: ${ADMIN_PASSWORD:}
  outbox:
    relay-interval-ms: 250
    batch-size: 50

logging:
  level:
    root: INFO
    com.edss: DEBUG
    org.springframework.security: INFO
