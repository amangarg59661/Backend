# ============================================================================
# Render Blueprint — self-backend
#
# Applies via the Render dashboard:  New +  ->  Blueprint  ->  point at this
# repo's main branch.  Render reads this file, creates the services, and pins
# every env var listed under `envVars`.  Values marked `sync: false` must be
# filled in via the dashboard on first apply and are never committed.
#
# The service builds directly from the repo Dockerfile — no separate registry
# step required for Render.  The same Dockerfile also feeds the GHCR release
# workflow, so a future migration to a VPS or AWS ECS is a registry pull, not
# a rebuild.
# ============================================================================

services:
  - type: web
    name: self-backend
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true

    # Actuator's readiness probe is what Render's health check hits.  Fails
    # closed on missing DB / Redis at boot.
    healthCheckPath: /actuator/health/readiness

    envVars:
      # --- Runtime ---
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"

      # --- Database (Supabase, external) ---
      - key: DB_PROVIDER
        value: supabase
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # --- Redis (Render-managed instance below) ---
      - key: REDIS_ENABLED
        value: "true"
      - key: REDIS_HOST
        fromService:
          type: redis
          name: self-backend-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: self-backend-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: self-backend-redis
          property: password

      # --- Mail (Resend) ---
      - key: MAIL_PROVIDER
        value: resend
      - key: MAIL_HOST
        value: smtp.resend.com
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_USERNAME
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false

      # --- Sentry ---
      - key: SENTRY_ENABLED
        value: "true"
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"

      # --- JWT ---
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: PT15M
      - key: JWT_REFRESH_TTL
        value: P30D

      # --- Secret encryption ---
      - key: SECRET_ENCRYPTION_KEY
        generateValue: true

      # --- Auth extras ---
      - key: AUTH_TWO_FACTOR_ENROLLMENT
        value: "true"
      - key: AUTH_REMEMBER_DEVICE_DAYS
        value: "30"

      # --- File storage (Supabase) ---
      - key: FILE_BACKEND
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET_PREFIX
        value: edss-prod

      # --- Payments ---
      - key: PAYMENTS_STRIPE_ENABLED
        value: "true"
      - key: PAYMENTS_RAZORPAY_ENABLED
        value: "true"
      - key: PAYMENTS_MANUAL_ENABLED
        value: "true"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      # --- Notifications ---
      - key: NOTIFICATIONS_EMAIL
        value: "true"
      - key: NOTIFICATIONS_IN_APP
        value: "true"
      - key: NOTIFICATIONS_WHATSAPP
        value: "true"
      - key: NOTIFICATIONS_SMS
        value: "false"

      # --- Calendar + messaging ---
      - key: CALENDAR_PROVIDER
        value: calcom
      - key: GOOGLE_CALENDAR_SYNC
        value: "true"
      - key: WHATSAPP_ENABLED
        value: "true"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: CALCOM_API_KEY
        sync: false
      - key: CALCOM_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false

      # --- CORS (required) ---
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # --- Rate limit ---
      - key: RATE_LIMIT_EMAIL
        value: "5"
      - key: RATE_LIMIT_IP
        value: "20"

  - type: redis
    name: self-backend-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []
